<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 50" width="160" height="50">
  <!-- Borde exterior blanco del logo box -->
  <rect x="1" y="1" width="62" height="48" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Texto SETEC en blanco dentro del box -->
  <text x="32" y="30" font-family="Raleway, Arial, sans-serif" font-size="15" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">SETEC</text>
  <!-- Wordmark a la derecha -->
  <text x="78" y="20" font-family="Raleway, Arial, sans-serif" font-size="10" font-weight="700"
        fill="white" dominant-baseline="middle" letter-spacing="1">Servicios</text>
  <text x="78" y="34" font-family="Raleway, Arial, sans-serif" font-size="10" font-weight="400"
        fill="rgba(255,255,255,0.8)" dominant-baseline="middle" letter-spacing="1">Técnicos</text>
</svg>
